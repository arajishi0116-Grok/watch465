name: Weekly Data Update

on:
  schedule:
    - cron: "0 9 * * 5"  # 毎週金曜 09:00 UTC（日本時間18:00）
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update member list
        working-directory: scraper
        run: python members.py

      - name: Fetch speech data and build stats
        working-directory: scraper
        run: python build_stats.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: 週次データ更新 $(date -u '+%Y-%m-%d')"
          git push

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
