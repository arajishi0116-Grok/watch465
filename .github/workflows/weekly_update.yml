name: Weekly Data Update

on:
  schedule:
    - cron: "0 17 * * 0"  # 毎週日曜 17:00 UTC（月曜 2:00 JST）
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update member list
        working-directory: scraper
        run: python members.py

      - name: Fetch speeches (cache) and build stats
        working-directory: scraper
        run: python fetch_all.py

      - name: Fetch bills index
        working-directory: scraper
        run: python fetch_bills_index.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: 週次データ更新 $(date -u '+%Y-%m-%d')"
          git push

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web

      - name: Post to X
        working-directory: scraper
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python post_to_x.py
